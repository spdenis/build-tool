spring.main.banner-mode=off
spring.main.web-application-type=none

# Directory where repositories are cloned. Each repo gets a subdirectory named after it.
# The subdirectory is deleted and re-created on every run to guarantee a clean clone.
clone.dir=${user.home}/multibuild-repos

# Default source branch used when a repo entry in repos.json does not specify sourceBranch.
# default.source.branch=main

# Required: integration branch name. The application will fail to start if this is not set.
# If the branch doesn't exist in a repo it will be created from the source branch and all
# pom.xml versions will be set to <branch>-SNAPSHOT.
# Can also be set via the INTEGRATION_BRANCH environment variable.
# integration.branch=

# When true, skips the remote push after committing version changes (all other steps run normally).
# Can also be set via the DRY_MODE environment variable.
dry.mode=false

# What to do when a repo's version doesn't follow the <numeric>-<branch>-SNAPSHOT guideline.
# "fail" (default) — abort and list all offending repos.
# "fix"            — auto-correct the version, commit, and push (respects dry.mode).
snapshot.version.mismatch=fix

# Timeout in seconds for JGit network operations (clone, fetch, push). Default: 120.
# git.timeout=120

# Shallow clone depth. 0 (default) performs a full clone.
# If the repository directory already exists it is reused: changes from a previous run
# are discarded (git reset --hard + git clean) and the remote is fetched instead of re-cloned.
# git.clone.depth=1

# Git implementation: "jgit" (default) uses the embedded JGit library;
# "native" shells out to the git CLI and passes proxy settings as environment variables
# (http_proxy / https_proxy / no_proxy). Use "native" when JGit's HTTP stack is
# incompatible with your server or proxy (e.g. GitHub Enterprise behind a proxy).
# git.implementation=jgit

# Git HTTP proxy — applies only to HTTPS git URLs. SSH is unaffected.
# git.proxy.host=proxy.example.com
# git.proxy.port=8080
# git.proxy.username=
# git.proxy.password=
# Domains that should use the proxy (comma-separated). Leave blank to proxy all HTTPS.
# Subdomain matching is supported: "example.com" also matches "git.example.com".
# git.proxy.domains=github.com,gitlab.com
# Domains that should bypass the proxy (comma-separated).
# git.proxy.bypass=internal.example.com

# Git authentication
# For HTTPS repositories: set github.token (used as bearer/password credential).
# github.token=
# When true, embeds the token directly in the clone URL (https://token:TOKEN@host/...)
# instead of using JGit's CredentialsProvider. Useful for proxied Git servers (e.g. GitHub
# Enterprise) where CredentialsProvider-based push fails. Per-repo tokens in repos.json
# take precedence over the global token regardless of this setting.
# git.auth.token.in.url=false
# For SSH repositories: keys are auto-discovered from ~/.ssh/ by default.
# Override the key file with ssh.key.path; provide the passphrase with ssh.passphrase.
# Set ssh.strict.host.key.checking=false to skip known_hosts verification (not recommended for production).
# ssh.key.path=
# ssh.passphrase=
# ssh.strict.host.key.checking=true

# Build settings
# build.enabled=true activates building artifacts in dependency order after cloning.
build.enabled=false
# build.mode: "snapshot" (default) builds with current -SNAPSHOT versions;
# "release" strips qualifiers, tags, builds, then bumps to next patch -SNAPSHOT.
build.mode=snapshot
# build.service selects the implementation: "local" (default) or "teamcity"
build.service=local
# Maven goals used by the local build service (space-separated)
build.maven.goals=clean install

# Lightspeed (Jenkins) settings — used when build.service=lightspeed or per-repo buildService=lightspeed.
# The service does not call Jenkins API directly; it polls the Maven repository until the built
# artifact appears (snapshot: updated maven-metadata.xml; release: artifact POM present).
# Snapshot trigger: injects a build.trigger.timestamp property into the root pom.xml, commits, and
# pushes to ensure Jenkins always receives a trigger commit.
# lightspeed.maven-repo.snapshots-url=https://nexus.example.com/repository/maven-snapshots
# lightspeed.maven-repo.releases-url=https://nexus.example.com/repository/maven-releases
# lightspeed.maven-repo.username=
# lightspeed.maven-repo.password=
# lightspeed.poll-interval-ms=20000
# lightspeed.timeout-ms=1800000

# TeamCity settings (only used when build.service=teamcity)
# teamcity.url=https://teamcity.example.com
# teamcity.token=your-access-token
# Pattern to derive the TeamCity build config ID from an artifact.
# Placeholders: {groupId}, {artifactId}, {version}
# teamcity.build-config-pattern={artifactId}
# teamcity.poll-interval-ms=5000
# teamcity.timeout-ms=600000
# Additional build parameters passed to every triggered TeamCity build (Spring map syntax).
# teamcity.build-parameters.system.myParam=value
# teamcity.build-parameters.env.MY_VAR=value
#teamcity.max-retries=2

# Path to a resume state file written by a previous failed run.
# When set, the build skips repos listed in the file and resumes from the first incomplete one.
# Defaults to <clone.dir>/.multibuild-resume.json (written automatically on failure).
# build.resume.state.file=

# Prefix prepended to every commit message made by this tool (e.g. a Jira ticket number).
# Required if your repo has a commit-msg hook that enforces a ticket prefix.
# commit.message.prefix=PROJ-123

spring.config.import=optional:file:./user.properties